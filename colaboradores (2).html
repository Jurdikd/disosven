<!DOCTYPE html>
<!--
  ============================================================
  MÓDULO DE COLABORADORES — Diseñadores x Venezuela
  ============================================================
  CÓMO USARLO:
  - Opción 1: súbelo como página aparte (ej: colaboradores.html) y enlázalo desde tu menú.
  - Opción 2: copia la sección <section class="collab-section">...</section>,
    el <style> y el <script> dentro de tu index.html (si tu index ya carga Bootstrap,
    no dupliques los <link>/<script> de Bootstrap).

  DÓNDE PONER TUS 400 NOMBRES:
  - Busca abajo "const colaboradores =" y edita esa lista.
  - Formato por persona:  { nombre: "Nombre", rol: "Especialidad", ig: "usuario" }
  - El campo "ig" es opcional (déjalo vacío "" o bórralo si no aplica).

  ¿QUIERES QUE SE ACTUALICE SOLO DESDE TU GOOGLE SHEET? (recomendado para 400)
  - Es posible y te lo explico en el chat. Evita editar este archivo cada vez.
  ============================================================
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colaboradores — Diseñadores x Venezuela</title>

<!-- Bootstrap 5 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<!-- Fuentes (consistentes con tu landing) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#F6F8FC;
    --ink:#16213A;
    --muted:#697089;
    --brand:#1D4ED8;
    --brand-deep:#1E3A8A;
    --line:#E3E8F2;
    --card:#FFFFFF;
  }

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
  }

  .collab-section{padding:72px 0 90px}

  /* ---- header ---- */
  .collab-eyebrow{
    font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--brand);font-weight:600;margin-bottom:14px;
  }
  .collab-title{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    letter-spacing:-.02em;line-height:1.05;
    font-size:clamp(2rem,5vw,3.2rem);margin-bottom:10px;
  }
  .collab-sub{color:var(--muted);font-size:1.05rem;max-width:46ch}

  /* count-up badge */
  .collab-count{
    display:inline-flex;align-items:baseline;gap:10px;
    margin:26px 0 6px;
  }
  .collab-count .big{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:clamp(2.6rem,8vw,4.6rem);line-height:1;
    color:var(--brand-deep);letter-spacing:-.03em;
  }
  .collab-count .lbl{color:var(--muted);font-weight:500}

  /* ---- search ---- */
  .collab-search{
    max-width:420px;margin:26px 0 40px;position:relative;
  }
  .collab-search input{
    border:1.5px solid var(--line);border-radius:999px;
    padding:13px 20px 13px 46px;font-size:15px;width:100%;
    background:var(--card);transition:border-color .15s ease,box-shadow .15s ease;
  }
  .collab-search input:focus{
    outline:none;border-color:var(--brand);
    box-shadow:0 0 0 4px rgba(29,78,216,.12);
  }
  .collab-search svg{
    position:absolute;left:17px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;color:var(--muted);
  }

  /* ---- cards ---- */
  .collab-card{
    background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:22px 16px 18px;text-align:center;
    height:100%;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
  }
  .collab-card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 28px -12px rgba(22,33,58,.22);
    border-color:#CBD5EE;
  }
  .collab-name{
    font-family:'Bricolage Grotesque',sans-serif;
    font-size:1.18rem;font-weight:700;line-height:1.16;
    margin:0 0 12px;color:var(--ink);letter-spacing:-.01em;
    min-height:2.7em;display:flex;align-items:center;justify-content:center;
  }
  /* etiquetas (rol + país) — más pequeñas que el nombre */
  .chip{
    display:inline-flex;align-items:center;gap:4px;
    font-size:10.5px;font-weight:500;letter-spacing:.01em;
    padding:4px 9px;line-height:1;
  }
  .chip-rol{
    color:var(--brand-deep);background:rgba(29,78,216,.10);
  }
  .chip-pais{
    color:#475569;background:#EEF1F6;
  }
  .chip-pais svg{width:9px;height:9px;opacity:.75}
  .collab-ig{
    font-size:12.5px;color:var(--brand);text-decoration:none;font-weight:500;
  }
  .collab-ig:hover{text-decoration:underline}

  /* ---- reveal animation ---- */
  .reveal{opacity:0;transform:translateY(16px)}
  .reveal.is-visible{
    opacity:1;transform:none;
    transition:opacity .5s ease,transform .5s ease;
  }

  .collab-empty{
    display:none;text-align:center;color:var(--muted);
    padding:50px 0;font-size:1.05rem;
  }

  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;transition:none}
    .collab-card{transition:none}
  }
</style>
</head>
<body>

<section class="collab-section">
  <div class="container">

    <!-- Encabezado -->
    <p class="collab-eyebrow">El equipo</p>
    <h2 class="collab-title">Quienes lo hacen posible</h2>
    <p class="collab-sub">Cientos de diseñadores poniendo su talento al servicio de la emergencia, de forma totalmente voluntaria.</p>

    <div class="collab-count">
      <span class="big" id="collabBig">0</span>
      <span class="lbl">colaboradores y contando</span>
    </div>

    <!-- Buscador -->
    <div class="collab-search">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path>
      </svg>
      <input type="text" id="collabSearch" placeholder="Busca por nombre, especialidad o país…" aria-label="Buscar colaborador">
    </div>

    <!-- Grid -->
    <div class="row g-3" id="collabGrid"></div>

    <p class="collab-empty" id="collabEmpty">No encontramos a nadie con ese nombre. Prueba con otra palabra.</p>

  </div>
</section>

<!-- Bootstrap JS (opcional, por si usas componentes interactivos de Bootstrap) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

<script>
  /* ============================================================
     ▼▼▼  TUS 400 COLABORADORES VAN AQUÍ  ▼▼▼
     Formato:  { nombre: "Nombre Apellido", rol: "Especialidad", pais: "País", ig: "usuario" }
     - "ig" es opcional. Déjalo "" si no tienes.
     ============================================================ */
  const colaboradores = [
    { nombre: "María Fernanda Rojas", rol: "Ilustración",        pais: "Venezuela",      ig: "mafe.rojas" },
    { nombre: "Jesús Escovar",        rol: "Dirección de arte",  pais: "Venezuela",      ig: "jurdikd" },
    { nombre: "Daniela Mendoza",      rol: "Motion / Animación", pais: "Colombia",       ig: "dani.motion" },
    { nombre: "Carlos Pérez",         rol: "Branding",           pais: "Chile",          ig: "" },
    { nombre: "Andrea Gómez",         rol: "Diseño editorial",   pais: "España",         ig: "andrea.edit" },
    { nombre: "Luis Hernández",       rol: "UI / UX",            pais: "Venezuela",      ig: "luishdz.ux" },
    { nombre: "Valentina Torres",     rol: "Redes sociales",     pais: "Argentina",      ig: "vale.social" },
    { nombre: "Ricardo Blanco",       rol: "Tipografía",         pais: "Perú",           ig: "" },
    { nombre: "Gabriela Suárez",      rol: "Fotografía",         pais: "Venezuela",      ig: "gabss.foto" },
    { nombre: "José Martínez",        rol: "Edición de video",   pais: "México",         ig: "jose.edita" },
    { nombre: "Patricia Núñez",       rol: "Copywriting",        pais: "Estados Unidos", ig: "patrinunez" },
    { nombre: "Eduardo Ramírez",      rol: "Ilustración",        pais: "Venezuela",      ig: "" },
    { nombre: "Camila Díaz",          rol: "Motion / Animación", pais: "Panamá",         ig: "cami.motion" },
    { nombre: "Alejandro Castro",     rol: "Branding",           pais: "Venezuela",      ig: "alecastro.co" },
    { nombre: "Sofía Vargas",         rol: "Diseño editorial",   pais: "Ecuador",        ig: "sofi.vargas" },
    { nombre: "Miguel Ángel León",    rol: "UI / UX",            pais: "Venezuela",      ig: "" }
    // ... pega aquí el resto de tus colaboradores, separados por comas
  ];
  /* ▲▲▲  FIN DE LA LISTA  ▲▲▲ */


  // ---------- Lógica del módulo (no necesitas tocar nada de aquí abajo) ----------

  const grid = document.getElementById('collabGrid');
  const empty = document.getElementById('collabEmpty');

  // Construir las tarjetas
  function render(lista){
    grid.innerHTML = '';
    lista.forEach(c => {
      const col = document.createElement('div');
      col.className = 'col-6 col-sm-4 col-md-3 col-xl-2';
      const ig = c.ig ? `<a class="collab-ig" href="https://instagram.com/${c.ig}" target="_blank" rel="noopener">@${c.ig}</a>` : '';
      const rolBadge  = c.rol  ? `<span class="badge rounded-pill chip chip-rol">${c.rol}</span>` : '';
      const paisBadge = c.pais ? `<span class="badge rounded-pill chip chip-pais"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>${c.pais}</span>` : '';
      const igHtml    = ig ? `<div class="mt-1">${ig}</div>` : '';
      col.innerHTML = `
        <article class="collab-card reveal">
          <h3 class="collab-name">${c.nombre}</h3>
          <div class="d-flex flex-wrap justify-content-center gap-1">
            ${rolBadge}${paisBadge}
          </div>
          ${igHtml}
        </article>`;
      grid.appendChild(col);
    });
    observarReveal();
  }

  // Animación de aparición al hacer scroll
  let observer;
  function observarReveal(){
    if (observer) observer.disconnect();
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('is-visible'));
      return;
    }
    observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting){
          // pequeño escalonado para que no aparezcan todas de golpe
          setTimeout(() => entry.target.classList.add('is-visible'), (i % 6) * 60);
          observer.unobserve(entry.target);
        }
      });
    }, { rootMargin: '0px 0px -40px 0px', threshold: 0.05 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

  // Buscador
  document.getElementById('collabSearch').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    const filtrados = colaboradores.filter(c =>
      c.nombre.toLowerCase().includes(q) ||
      (c.rol  || '').toLowerCase().includes(q) ||
      (c.pais || '').toLowerCase().includes(q)
    );
    render(filtrados);
    empty.style.display = filtrados.length ? 'none' : 'block';
  });

  // Contador animado (cuenta de 0 hasta el total)
  function contarHasta(el, total){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches){ el.textContent = total; return; }
    const dur = 1100, t0 = performance.now();
    function paso(t){
      const p = Math.min((t - t0) / dur, 1);
      el.textContent = Math.floor(p * total);
      if (p < 1) requestAnimationFrame(paso);
    }
    requestAnimationFrame(paso);
  }

  // Inicializar
  render(colaboradores);
  contarHasta(document.getElementById('collabBig'), colaboradores.length);
</script>

</body>
</html>
